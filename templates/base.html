<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoMarket — главная</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="hero">
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <i class="fas fa-exchange-alt"></i> EchoMarket
            </div>
            <div class="nav-links">
                <a href="{{ url_for('main') }}"><i class="fas fa-home"></i> Главная</a>
                <a href="{{ url_for('adver') }}"><i class="fas fa-tag"></i> Объявления</a>
                <a href="{{ url_for('shops') }}"><i class="fas fa-store"></i> Магазины</a>

                <div class="dropdown" id="userDropdown">
                    <button class="dropdown-btn" id="dropdownBtn">
                        <i class="fas fa-user"></i>
                        <span id="userBtnText">Войти</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <div id="menuContent"></div>
                    </div>
                </div>
            </div>
        </div>

        {% block content %}
        <div class="hero-content">
            <h1>Покупай и продавай всё, что захочешь</h1>
            <p>Более 10 миллионов объявлений. Безопасная сделка с гарантией</p>
        </div>
        {% endblock %}
    </div>
</div>

<div class="products-grid" id="productsGrid"></div>

{% block content2 %}{% endblock %}

<!-- Модальные окна -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-sign-in-alt"></i> Вход в аккаунт</h2>
            <button class="modal-close" onclick="closeModal('loginModal')">&times;</button>
        </div>
        <div class="modal-body">
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="ivan@example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••" required>
                </div>
                <div id="loginError" class="error-msg"></div>
                <button type="submit" class="modal-btn">Войти</button>
            </form>
            <div class="modal-footer">
                Нет аккаунта? <a onclick="openRegisterFromLogin()">Зарегистрироваться</a>
            </div>
        </div>
    </div>
</div>

<div id="registerModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-user-plus"></i> Регистрация</h2>
            <button class="modal-close" onclick="closeModal('registerModal')">&times;</button>
        </div>
        <div class="modal-body">
            <form id="registerForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Имя</label>
                    <input type="text" id="regName" placeholder="Иван Иванов" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" placeholder="ivan@example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Телефон</label>
                    <input type="tel" id="regPhone" placeholder="+7 (999) 123-45-67">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Пароль</label>
                    <input type="password" id="regPassword" placeholder="минимум 6 символов" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-check-circle"></i> Подтвердите пароль</label>
                    <input type="password" id="regConfirmPassword" placeholder="повторите пароль" required>
                </div>
                <div id="registerError" class="error-msg"></div>
                <button type="submit" class="modal-btn">Зарегистрироваться</button>
            </form>
            <div class="modal-footer">
                Уже есть аккаунт? <a onclick="openLoginFromRegister()">Войти</a>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== СОСТОЯНИЕ АВТОРИЗАЦИИ ==========
    let isLoggedIn = false;
    let currentUser = null;

    // ========== ФУНКЦИИ API ==========
    async function apiRequest(url, method, data) {
        const options = {
            method: method,
            headers: { 'Content-Type': 'application/json' }
        };
        if (data) options.body = JSON.stringify(data);

        try {
            const response = await fetch(url, options);
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            return { success: false, error: 'Ошибка соединения с сервером' };
        }
    }

    // ========== ПРОВЕРКА АВТОРИЗАЦИИ ПРИ ЗАГРУЗКЕ ==========
    async function checkAuth() {
        const result = await apiRequest('/api/check-auth', 'GET');
        if (result.authenticated) {
            isLoggedIn = true;
            currentUser = result.user;
            updateDropdownMenu();
        }
    }

    // ========== ФУНКЦИИ АВТОРИЗАЦИИ ==========
    async function login(email, password) {
        const result = await apiRequest('/api/login', 'POST', { email, password });

        if (result.success) {
            isLoggedIn = true;
            currentUser = result.user;
            updateDropdownMenu();
            closeModal('loginModal');
            showToast(result.message, 'success');
            return true;
        } else {
            document.getElementById('loginError').innerHTML = result.error;
            return false;
        }
    }

    async function register(name, email, phone, password, confirmPassword) {
        // Валидация на клиенте
        if (name.length < 2) {
            document.getElementById('registerError').innerHTML = 'Имя должно содержать минимум 2 символа';
            return false;
        }
        if (!email.includes('@')) {
            document.getElementById('registerError').innerHTML = 'Введите корректный email';
            return false;
        }
        if (password.length < 6) {
            document.getElementById('registerError').innerHTML = 'Пароль должен содержать минимум 6 символов';
            return false;
        }
        if (password !== confirmPassword) {
            document.getElementById('registerError').innerHTML = 'Пароли не совпадают';
            return false;
        }

        const result = await apiRequest('/api/register', 'POST', {
            name, email, phone, password, confirm_password: confirmPassword
        });

        if (result.success) {
            isLoggedIn = true;
            currentUser = result.user;
            updateDropdownMenu();
            closeModal('registerModal');
            showToast(result.message, 'success');
            return true;
        } else {
            if (result.errors) {
                document.getElementById('registerError').innerHTML = result.errors.join(', ');
            } else {
                document.getElementById('registerError').innerHTML = result.error || 'Ошибка регистрации';
            }
            return false;
        }
    }

    async function logout() {
        await apiRequest('/api/logout', 'POST');
        isLoggedIn = false;
        currentUser = null;
        updateDropdownMenu();
        showToast('Вы вышли из аккаунта', 'success');
        dropdown.classList.remove('active');
    }

    // ========== ОБНОВЛЕНИЕ ВЫПАДАЮЩЕГО МЕНЮ ==========
    function updateDropdownMenu() {
        const menuContent = document.getElementById('menuContent');
        const userBtnText = document.getElementById('userBtnText');

        if (isLoggedIn && currentUser) {
            userBtnText.textContent = currentUser.name;

            menuContent.innerHTML = `
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                    <div class="user-name">${escapeHtml(currentUser.name)}</div>
                    <div class="user-email">${escapeHtml(currentUser.email)}</div>
                </div>
                <div class="menu-item" onclick="viewProfile()">
                    <i class="fas fa-id-card"></i>
                    <span>Мой профиль</span>
                </div>
                <div class="menu-item" onclick="viewMyAds()">
                    <i class="fas fa-list-ul"></i>
                    <span>Мои объявления</span>
                </div>
                <div class="menu-item" onclick="createAd()">
                    <i class="fas fa-plus-circle"></i>
                    <span>Подать объявление</span>
                </div>
                <div class="menu-item" onclick="viewFavorites()">
                    <i class="fas fa-heart"></i>
                    <span>Избранное</span>
                </div>
                <div class="menu-divider"></div>
                <div class="menu-item logout-item" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Выйти</span>
                </div>
            `;
        } else {
            userBtnText.textContent = 'Войти';

            menuContent.innerHTML = `
                <div class="menu-header">
                    <p>Войдите в аккаунт, чтобы продавать и покупать</p>
                </div>
                <div class="menu-item" onclick="openLoginModal()">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Войти</span>
                </div>
                <div class="menu-item" onclick="openRegisterModal()">
                    <i class="fas fa-user-plus"></i>
                    <span>Зарегистрироваться</span>
                </div>
                <div class="menu-divider"></div>
                <div class="menu-item" onclick="continueAsGuest()">
                    <i class="fas fa-eye"></i>
                    <span>Продолжить как гость</span>
                </div>
            `;
        }
    }

    // Экранирование HTML для безопасности
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== УПРАВЛЕНИЕ ВЫПАДАЮЩИМ СПИСКОМ ==========
    const dropdown = document.getElementById('userDropdown');
    const dropdownBtn = document.getElementById('dropdownBtn');

    dropdownBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('active');
    });

    document.addEventListener('click', (e) => {
        if (!dropdown.contains(e.target)) {
            dropdown.classList.remove('active');
        }
    });

    // ========== МОДАЛЬНЫЕ ОКНА ==========
    function openModal(modalId) {
        document.getElementById(modalId).classList.add('active');
        dropdown.classList.remove('active');
    }

    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
    }

    function openLoginModal() { openModal('loginModal'); }
    function openRegisterModal() { openModal('registerModal'); }
    function openLoginFromRegister() { closeModal('registerModal'); openLoginModal(); }
    function openRegisterFromLogin() { closeModal('loginModal'); openRegisterModal(); }

    // ========== ДЕЙСТВИЯ В МЕНЮ ==========
    function viewProfile() {
        showToast(`Профиль пользователя: ${currentUser.name}`, 'success');
        dropdown.classList.remove('active');
    }

    function viewMyAds() {
        showToast('Ваши объявления (в разработке)', 'info');
        dropdown.classList.remove('active');
    }

    function createAd() {
        showToast('Форма создания объявления откроется скоро', 'info');
        dropdown.classList.remove('active');
    }

    function viewFavorites() {
        showToast('Избранное (в разработке)', 'info');
        dropdown.classList.remove('active');
    }

    function continueAsGuest() {
        showToast('Гостевой режим: вы можете просматривать объявления', 'info');
        dropdown.classList.remove('active');
    }

    // ========== УВЕДОМЛЕНИЯ ==========
    function showToast(message, type = 'success') {
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) existingToast.remove();

        const toast = document.createElement('div');
        toast.className = 'toast-message';

        const colors = {
            success: '#10b981',
            error: '#ef4444',
            info: '#3b82f6'
        };

        const icons = {
            success: 'fa-check-circle',
            error: 'fa-exclamation-circle',
            info: 'fa-info-circle'
        };

        toast.innerHTML = `<i class="fas ${icons[type]}"></i><span>${message}</span>`;
        toast.style.cssText = `
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: ${colors[type]};
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            font-family: 'Inter', sans-serif;
        `;
        document.body.appendChild(toast);

        setTimeout(() => { toast.remove(); }, 3000);
    }

    // ========== ТОВАРЫ (ДЕМО) ==========
    const products = [
        { id: 1, name: 'iPhone 14 Pro', price: '75 000 ₽', icon: 'fa-mobile-alt', color: '#3b82f6' },
        { id: 2, name: 'Кожаная куртка', price: '12 500 ₽', icon: 'fa-tshirt', color: '#e67e22' },
        { id: 3, name: 'Горный велосипед', price: '28 000 ₽', icon: 'fa-bicycle', color: '#16a34a' },
        { id: 4, name: 'MacBook Air M2', price: '110 000 ₽', icon: 'fa-laptop', color: '#8b5cf6' },
        { id: 5, name: 'Наушники Sony', price: '15 000 ₽', icon: 'fa-headphones', color: '#ec489a' },
        { id: 6, name: 'Диван угловой', price: '45 000 ₽', icon: 'fa-couch', color: '#d97706' }
    ];

    function loadProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;

        grid.innerHTML = products.map(product => `
            <div class="product-card">
                <div class="product-image" style="background: ${product.color}10;">
                    <i class="fas ${product.icon}" style="color: ${product.color}; font-size: 3rem;"></i>
                </div>
                <div class="product-title">${product.name}</div>
                <div class="product-price">${product.price}</div>
                <div style="margin-top: 0.5rem; font-size: 0.75rem; color: #64748b;">
                    <i class="fas fa-map-marker-alt"></i> Москва
                </div>
            </div>
        `).join('');
    }

    // ========== ОБРАБОТЧИКИ ФОРМ ==========
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        await login(email, password);
        document.getElementById('loginForm').reset();
        document.getElementById('loginError').innerHTML = '';
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const phone = document.getElementById('regPhone').value;
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        await register(name, email, phone, password, confirmPassword);
        document.getElementById('registerForm').reset();
        document.getElementById('registerError').innerHTML = '';
    });

    // ========== ЗАКРЫТИЕ МОДАЛЬНЫХ ОКОН ПО ESC И КЛИКУ ==========
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.querySelectorAll('.modal').forEach(modal => {
                modal.classList.remove('active');
            });
            dropdown.classList.remove('active');
        }
    });

    document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    });

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    async function init() {
        await checkAuth();
        updateDropdownMenu();
        loadProducts();
    }

    init();
</script>
</body>
</html>
